  <!-- 隠しコマンド発動エフェクト -->
  <div id="secret-burst" style="display:none;position:fixed;inset:0;z-index:9999;pointer-events:none;background:radial-gradient(circle,rgba(255,220,120,0.9),rgba(255,160,60,0.6),transparent 70%);opacity:0;transition:opacity 0.3s"></div>

  <script>
  // ---- 隠しコマンド: 名前スワイプ（右→お酒、左→トレーニング、上→スポーツ） ----
  (function () {
    var h1 = document.querySelector('.container h1');
    if (!h1) return;
    var startX = 0, startY = 0, dragging = false, dx = 0, dy = 0;

    h1.style.cursor = 'grab';
    h1.style.userSelect = 'none';
    h1.style.transition = 'transform 0.1s, text-shadow 0.1s, filter 0.1s';

    function onStart(x, y) {
      startX = x; startY = y; dragging = true; dx = 0; dy = 0;
      h1.style.cursor = 'grabbing';
    }
    function onMove(x, y) {
      if (!dragging) return;
      dx = x - startX;
      dy = y - startY;
      // 主軸を判定（横 vs 縦）
      var absDx = Math.abs(dx), absDy = Math.abs(dy);
      var tx, ty, ratio;
      if (absDy > absDx) {
        // 縦方向
        tx = 0; ty = dy * 0.6;
        ratio = Math.min(absDy / 50, 1);
      } else {
        // 横方向
        tx = dx * 0.6; ty = 0;
        ratio = Math.min(absDx / 50, 1);
      }
      h1.style.transform = 'translate(' + tx + 'px,' + ty + 'px)';
      h1.style.textShadow = '0 0 ' + (ratio * 25) + 'px rgba(255,220,120,' + (ratio * 0.9) + '), 0 0 ' + (ratio * 50) + 'px rgba(255,160,60,' + (ratio * 0.5) + ')';
      h1.style.filter = 'brightness(' + (1 + ratio * 0.3) + ')';
    }
    function onEnd() {
      if (!dragging) return;
      dragging = false;
      var absDx = Math.abs(dx), absDy = Math.abs(dy);
      var triggered = false, dest = '';

      if (absDy > absDx && dy < -50) {
        // 上スワイプ → スポーツ
        h1.style.transform = 'translate(0,-120px) scale(1.1)';
        triggered = true; dest = 'secret-sports.html';
      } else if (absDy > absDx && dy > 50) {
        // 下スワイプ → 国
        h1.style.transform = 'translate(0,120px) scale(1.1)';
        triggered = true; dest = 'secret-country.html';
      } else if (absDx >= 50) {
        // 横スワイプ
        var dir = dx > 0 ? 1 : -1;
        h1.style.transform = 'translate(' + (dir * 120) + 'px,0) scale(1.1)';
        triggered = true;
        dest = dx > 0 ? 'secret.html' : 'secret-training.html';
      }

      if (triggered) {
        h1.style.filter = 'brightness(1.5)';
        var burst = document.getElementById('secret-burst');
        burst.style.display = 'block';
        requestAnimationFrame(function () { burst.style.opacity = '1'; });
        setTimeout(function () { location.href = dest; }, 450);
      } else {
        h1.style.transform = '';
        h1.style.textShadow = '';
        h1.style.filter = '';
        h1.style.cursor = 'grab';
      }
    }

    // マウス
    h1.addEventListener('mousedown', function (e) { e.preventDefault(); onStart(e.clientX, e.clientY); });
    window.addEventListener('mousemove', function (e) { onMove(e.clientX, e.clientY); });
    window.addEventListener('mouseup', onEnd);

    // タッチ
    h1.addEventListener('touchstart', function (e) { onStart(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
    window.addEventListener('touchmove', function (e) { onMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: true });
    window.addEventListener('touchend', onEnd);
  })();
  </script>
