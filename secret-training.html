<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>💪 好きなトレーニングランキング 🏋️</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="game.css">
</head>
<body class="page-sub">

  <div class="game-title">
    <h1>💪 好きなトレーニングランキング 🏋️</h1>
    <p>種目が出たら、好きな順位にはめ込もう！</p>
  </div>

  <div class="game-area">
    <div class="card-area">
      <div>
        <p class="card-label">今回のお題</p>
        <div class="drink-card" id="current-card">
          <span class="emoji" id="card-emoji">💪</span>
          <span class="name" id="card-name">ベンチプレス</span>
        </div>
        <p class="progress" id="progress">1 / 10</p>
      </div>
    </div>
    <div class="ranking" id="ranking"></div>
  </div>

  <div class="complete-overlay" id="complete">
    <div class="complete-title">🎉 完成！</div>
    <div class="complete-ranking" id="complete-ranking"></div>
    <button class="btn-retry" id="btn-retry">🔄 もう一度遊ぶ</button>
    <button class="btn-back" onclick="location.href='index.html'">← トップに戻る</button>
  </div>

  <script>
  window.GAME_ITEMS = [
    {emoji:'🏋️',name:'ベンチプレス'},{emoji:'🦵',name:'スクワット'},{emoji:'💪',name:'デッドリフト'},
    {emoji:'🧗',name:'懸垂'},{emoji:'🔥',name:'腹筋'},{emoji:'💪',name:'ダンベルカール'},
    {emoji:'🙆',name:'ショルダープレス'},{emoji:'🏃',name:'ランニング'},{emoji:'🧘',name:'プランク'},
    {emoji:'⬇️',name:'ディップス'},{emoji:'🦿',name:'レッグプレス'},{emoji:'🔽',name:'ラットプルダウン'},
    {emoji:'📐',name:'インクラインプレス'},{emoji:'🚣',name:'バーベルロウ'},{emoji:'🦶',name:'カーフレイズ'},
    {emoji:'🏋️',name:'オーバーヘッドプレス'},{emoji:'🔄',name:'ケーブルクロスオーバー'},
    {emoji:'🦵',name:'ブルガリアンスクワット'},{emoji:'🏃',name:'バーピー'},{emoji:'⛓️',name:'フェイスプル'},
    {emoji:'🦿',name:'レッグカール'},{emoji:'💪',name:'ハンマーカール'},
    {emoji:'🔥',name:'マウンテンクライマー'},{emoji:'🚴',name:'エアロバイク'}
  ];
  </script>
  <script src="game.js"></script>

</body>
</html>
