<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>🌍 好きな国ランキング ✈️</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="game.css">
</head>
<body class="page-sub">

  <div class="game-title">
    <h1>🌍 好きな国ランキング ✈️</h1>
    <p>国が出たら、好きな順位にはめ込もう！</p>
  </div>

  <div class="game-area">
    <div class="card-area">
      <div>
        <p class="card-label">今回のお題</p>
        <div class="drink-card" id="current-card">
          <span class="emoji" id="card-emoji">🇯🇵</span>
          <span class="name" id="card-name">日本</span>
        </div>
        <p class="progress" id="progress">1 / 10</p>
      </div>
    </div>
    <div class="ranking" id="ranking"></div>
  </div>

  <div class="complete-overlay" id="complete">
    <div class="complete-title">🎉 完成！</div>
    <div class="complete-ranking" id="complete-ranking"></div>
    <button class="btn-retry" id="btn-retry">🔄 もう一度遊ぶ</button>
    <button class="btn-back" onclick="location.href='index.html'">← トップに戻る</button>
  </div>

  <script>
  window.GAME_ITEMS = [
    {emoji:'🇯🇵',name:'日本'},{emoji:'🇺🇸',name:'アメリカ'},{emoji:'🇫🇷',name:'フランス'},
    {emoji:'🇮🇹',name:'イタリア'},{emoji:'🇪🇸',name:'スペイン'},{emoji:'🇬🇧',name:'イギリス'},
    {emoji:'🇩🇪',name:'ドイツ'},{emoji:'🇦🇺',name:'オーストラリア'},{emoji:'🇨🇦',name:'カナダ'},
    {emoji:'🇧🇷',name:'ブラジル'},{emoji:'🇹🇭',name:'タイ'},{emoji:'🇮🇳',name:'インド'},
    {emoji:'🇲🇽',name:'メキシコ'},{emoji:'🇬🇷',name:'ギリシャ'},{emoji:'🇵🇹',name:'ポルトガル'},
    {emoji:'🇲🇦',name:'モロッコ'},{emoji:'🇮🇸',name:'アイスランド'},{emoji:'🇳🇿',name:'ニュージーランド'},
    {emoji:'🇰🇷',name:'韓国'},{emoji:'🇵🇪',name:'ペルー'},{emoji:'🇨🇭',name:'スイス'},
    {emoji:'🇪🇬',name:'エジプト'},{emoji:'🇹🇷',name:'トルコ'},{emoji:'🇻🇳',name:'ベトナム'}
  ];
  </script>
  <script src="game.js"></script>

</body>
</html>
