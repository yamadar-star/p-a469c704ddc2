<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>🏅 好きなスポーツランキング ⚽</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="game.css">
</head>
<body class="page-sub">

  <div class="game-title">
    <h1>🏅 好きなスポーツランキング ⚽</h1>
    <p>種目が出たら、好きな順位にはめ込もう！</p>
  </div>

  <div class="game-area">
    <div class="card-area">
      <div>
        <p class="card-label">今回のお題</p>
        <div class="drink-card" id="current-card">
          <span class="emoji" id="card-emoji">⚽</span>
          <span class="name" id="card-name">サッカー</span>
        </div>
        <p class="progress" id="progress">1 / 10</p>
      </div>
    </div>
    <div class="ranking" id="ranking"></div>
  </div>

  <div class="complete-overlay" id="complete">
    <div class="complete-title">🎉 完成！</div>
    <div class="complete-ranking" id="complete-ranking"></div>
    <button class="btn-retry" id="btn-retry">🔄 もう一度遊ぶ</button>
    <button class="btn-back" onclick="location.href='index.html'">← トップに戻る</button>
  </div>

  <script>
  window.GAME_ITEMS = [
    {emoji:'⚽',name:'サッカー'},{emoji:'⚾',name:'野球'},{emoji:'🏀',name:'バスケットボール'},
    {emoji:'🎾',name:'テニス'},{emoji:'🏊',name:'水泳'},{emoji:'🏐',name:'バレーボール'},
    {emoji:'🏉',name:'ラグビー'},{emoji:'🏃',name:'陸上'},{emoji:'⛳',name:'ゴルフ'},
    {emoji:'🏓',name:'卓球'},{emoji:'🏸',name:'バドミントン'},{emoji:'⛷️',name:'スキー'},
    {emoji:'🏄',name:'サーフィン'},{emoji:'🥊',name:'ボクシング'},{emoji:'🤸',name:'体操'},
    {emoji:'🥋',name:'柔道'},{emoji:'⚔️',name:'剣道'},{emoji:'🚴',name:'自転車'},
    {emoji:'🧗',name:'クライミング'},{emoji:'🥊',name:'格闘技'},{emoji:'🏒',name:'アイスホッケー'},
    {emoji:'🤾',name:'ハンドボール'},{emoji:'🏹',name:'アーチェリー'},{emoji:'🛹',name:'スケートボード'}
  ];
  </script>
  <script src="game.js"></script>

</body>
</html>
