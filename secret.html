<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>🍶 好きなお酒ランキング 🍺</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="game.css">
</head>
<body class="page-sub">

  <div class="game-title">
    <h1>🍶 好きなお酒ランキング 🍺</h1>
    <p>カードが出たら、好きな順位にはめ込もう！</p>
  </div>

  <div class="game-area">
    <div class="card-area">
      <div>
        <p class="card-label">今回のお題</p>
        <div class="drink-card" id="current-card">
          <span class="emoji" id="card-emoji">🍺</span>
          <span class="name" id="card-name">ビール</span>
        </div>
        <p class="progress" id="progress">1 / 10</p>
      </div>
    </div>
    <div class="ranking" id="ranking"></div>
  </div>

  <div class="complete-overlay" id="complete">
    <div class="complete-title">🎉 完成！</div>
    <div class="complete-ranking" id="complete-ranking"></div>
    <button class="btn-retry" id="btn-retry">🔄 もう一度遊ぶ</button>
    <button class="btn-back" onclick="location.href='index.html'">← トップに戻る</button>
  </div>

  <script>
  window.GAME_ITEMS = [
    {emoji:'🍺',name:'ビール'},{emoji:'🍷',name:'ワイン'},{emoji:'🍶',name:'日本酒'},
    {emoji:'🥃',name:'ハイボール'},{emoji:'🍸',name:'カクテル'},{emoji:'🥂',name:'シャンパン'},
    {emoji:'🫗',name:'焼酎'},{emoji:'🥃',name:'ウイスキー'},{emoji:'🍑',name:'梅酒'},
    {emoji:'🍋',name:'レモンサワー'},{emoji:'🍹',name:'モヒート'},{emoji:'🫧',name:'チューハイ'},
    {emoji:'🍺',name:'クラフトビール'},{emoji:'🌹',name:'ロゼワイン'},{emoji:'🧊',name:'ジントニック'},
    {emoji:'🥥',name:'マリブコーク'},{emoji:'🍊',name:'スクリュードライバー'},{emoji:'🌊',name:'泡盛'},
    {emoji:'🍇',name:'グラッパ'},{emoji:'🥃',name:'ブランデー'},{emoji:'🍸',name:'マティーニ'},
    {emoji:'🌅',name:'テキーラサンライズ'},{emoji:'🫧',name:'スパークリングワイン'},{emoji:'🍈',name:'メロンサワー'}
  ];
  </script>
  <script src="game.js"></script>

</body>
</html>
